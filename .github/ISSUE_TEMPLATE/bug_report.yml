name: Bug report
description: Report a bug or unexpected behaviour
labels: ["bug"]
body:
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Game-breaking (cannot play)
        - Serious (major feature broken)
        - Minor (noticeable but playable)
        - Balance (something feels off)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Build version
      placeholder: "e.g. v66.57_patch8"
    validations:
      required: true

  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      placeholder: Describe what went wrong
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What should have happened
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce (if known)
      placeholder: "1. ...\n2. ...\n3. ..."

  - type: dropdown
    id: log_attached
    attributes:
      label: Log attached?
      options:
        - "Yes — compact log"
        - "Yes — full log"
        - "Yes — both"
        - "No"
    validations:
      required: true

  - type: input
    id: log_path
    attributes:
      label: Log path in repo (if saved)
      placeholder: "logs/bot-runs/20260430-101214/"
